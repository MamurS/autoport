<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <linearGradient id="bodyPaint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4d4d8"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="50%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="seatLeather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6d3"/>
      <stop offset="30%" stop-color="#e8d5be"/>
      <stop offset="70%" stop-color="#dcc8a8"/>
      <stop offset="100%" stop-color="#d4bc96"/>
    </linearGradient>
    <linearGradient id="seatSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9b48a"/>
      <stop offset="100%" stop-color="#dcc8a8"/>
    </linearGradient>
    <linearGradient id="dashGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="50%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2e2e2e"/>
    </linearGradient>
    <linearGradient id="consoleDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="floorCarpet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8a29e"/>
      <stop offset="100%" stop-color="#8a8580"/>
    </linearGradient>
    <radialGradient id="seatCushionHL">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
    <pattern id="stitch" width="8" height="1" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0.5" x2="4" y2="0.5" stroke="#c9b48a" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Car body shell -->
  <rect x="15" y="10" width="370" height="500" rx="55" fill="url(#bodyPaint)" stroke="#9ca3af" stroke-width="2.5"/>
  <!-- Inner body panel -->
  <rect x="28" y="25" width="344" height="470" rx="42" fill="#e7e5e4" stroke="#d6d3d1" stroke-width="1.5"/>

  <!-- Wheels -->
  <rect x="0" y="95" width="22" height="55" rx="10" fill="#27272a" stroke="#3f3f46" stroke-width="1.5"/>
  <rect x="378" y="95" width="22" height="55" rx="10" fill="#27272a" stroke="#3f3f46" stroke-width="1.5"/>
  <rect x="0" y="355" width="22" height="55" rx="10" fill="#27272a" stroke="#3f3f46" stroke-width="1.5"/>
  <rect x="378" y="355" width="22" height="55" rx="10" fill="#27272a" stroke="#3f3f46" stroke-width="1.5"/>
  <!-- Wheel rims -->
  <circle cx="11" cy="122" r="6" fill="#52525b" stroke="#71717a" stroke-width="1"/>
  <circle cx="389" cy="122" r="6" fill="#52525b" stroke="#71717a" stroke-width="1"/>
  <circle cx="11" cy="382" r="6" fill="#52525b" stroke="#71717a" stroke-width="1"/>
  <circle cx="389" cy="382" r="6" fill="#52525b" stroke="#71717a" stroke-width="1"/>

  <!-- Side mirrors -->
  <ellipse cx="8" cy="58" rx="8" ry="12" fill="#d4d4d8" stroke="#9ca3af" stroke-width="1.5"/>
  <ellipse cx="8" cy="58" rx="5" ry="8" fill="url(#glass)"/>
  <ellipse cx="392" cy="58" rx="8" ry="12" fill="#d4d4d8" stroke="#9ca3af" stroke-width="1.5"/>
  <ellipse cx="392" cy="58" rx="5" ry="8" fill="url(#glass)"/>

  <!-- Windshield -->
  <path d="M 75 28 Q 200 2 325 28 L 335 80 Q 200 65 65 80 Z" fill="url(#glass)" stroke="#7da8c9" stroke-width="1.5" opacity="0.85"/>
  <!-- Windshield glare -->
  <path d="M 120 32 Q 200 18 280 32 L 270 55 Q 200 45 130 55 Z" fill="white" opacity="0.15"/>
  <!-- A-pillars -->
  <line x1="75" y1="28" x2="65" y2="80" stroke="#a8a29e" stroke-width="5" stroke-linecap="round"/>
  <line x1="325" y1="28" x2="335" y2="80" stroke="#a8a29e" stroke-width="5" stroke-linecap="round"/>

  <!-- Rear window -->
  <path d="M 85 480 Q 200 505 315 480 L 325 440 Q 200 450 75 440 Z" fill="url(#glass)" stroke="#7da8c9" stroke-width="1.5" opacity="0.75"/>
  <!-- C-pillars -->
  <line x1="85" y1="480" x2="75" y2="440" stroke="#a8a29e" stroke-width="5" stroke-linecap="round"/>
  <line x1="315" y1="480" x2="325" y2="440" stroke="#a8a29e" stroke-width="5" stroke-linecap="round"/>

  <!-- Dashboard -->
  <rect x="40" y="72" width="320" height="52" rx="10" fill="url(#dashGrad)"/>
  <rect x="42" y="74" width="316" height="48" rx="9" fill="none" stroke="#555" stroke-width="0.5"/>
  <!-- Instrument cluster -->
  <circle cx="95" cy="95" r="18" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <circle cx="95" cy="95" r="14" fill="#111" stroke="#333" stroke-width="0.5"/>
  <line x1="95" y1="84" x2="95" y2="95" stroke="#ef4444" stroke-width="1.2"/>
  <circle cx="135" cy="95" r="18" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <circle cx="135" cy="95" r="14" fill="#111" stroke="#333" stroke-width="0.5"/>
  <line x1="130" y1="84" x2="138" y2="93" stroke="#ef4444" stroke-width="1.2"/>
  <!-- Center display -->
  <rect x="173" y="78" width="65" height="32" rx="5" fill="#111" stroke="#444" stroke-width="1.2"/>
  <rect x="176" y="81" width="59" height="26" rx="3" fill="#0f172a"/>
  <text x="205" y="98" text-anchor="middle" fill="#38bdf8" font-size="8" font-family="monospace">21°C</text>
  <!-- AC vents -->
  <rect x="255" y="80" width="35" height="12" rx="4" fill="#333" stroke="#444" stroke-width="0.8"/>
  <line x1="260" y1="86" x2="285" y2="86" stroke="#555" stroke-width="0.5"/>
  <rect x="255" y="96" width="35" height="12" rx="4" fill="#333" stroke="#444" stroke-width="0.8"/>
  <line x1="260" y1="102" x2="285" y2="102" stroke="#555" stroke-width="0.5"/>
  <!-- Glove box -->
  <rect x="300" y="80" width="50" height="30" rx="6" fill="#3a3a3a" stroke="#4a4a4a" stroke-width="0.8"/>
  <line x1="325" y1="108" x2="325" y2="112" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Rearview mirror -->
  <rect x="185" y="45" width="30" height="12" rx="6" fill="#3a3a3a" stroke="#555" stroke-width="1"/>
  <rect x="188" y="48" width="24" height="6" rx="3" fill="#1e3a5f"/>

  <!-- STEERING WHEEL -->
  <g transform="translate(105, 162)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#4a4a4a" stroke-width="10"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#555" stroke-width="6"/>
    <circle cx="0" cy="0" r="16" fill="#444" stroke="#555" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="#3a3a3a" stroke="#666" stroke-width="0.5"/>
    <!-- Spokes -->
    <line x1="0" y1="-16" x2="0" y2="-37" stroke="#4a4a4a" stroke-width="7" stroke-linecap="round"/>
    <line x1="-14" y1="8" x2="-33" y2="22" stroke="#4a4a4a" stroke-width="7" stroke-linecap="round"/>
    <line x1="14" y1="8" x2="33" y2="22" stroke="#4a4a4a" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Floor / carpet area -->
  <rect x="40" y="125" width="130" height="310" rx="15" fill="url(#floorCarpet)" opacity="0.3"/>
  <rect x="230" y="125" width="130" height="310" rx="15" fill="url(#floorCarpet)" opacity="0.3"/>

  <!-- Center console -->
  <rect x="172" y="130" width="56" height="210" rx="8" fill="url(#consoleDark)" stroke="#4a4a4a" stroke-width="1"/>
  <!-- Gear shift housing -->
  <rect x="182" y="145" width="36" height="45" rx="8" fill="#333" stroke="#4a4a4a" stroke-width="1"/>
  <ellipse cx="200" cy="168" rx="10" ry="12" fill="#555" stroke="#666" stroke-width="1.5"/>
  <ellipse cx="200" cy="166" rx="6" ry="7" fill="#666" stroke="#777" stroke-width="0.5"/>
  <!-- Cup holders -->
  <circle cx="192" cy="215" r="16" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="192" cy="215" r="12" fill="#222" stroke="#333" stroke-width="0.5"/>
  <circle cx="208" cy="248" r="16" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="208" cy="248" r="12" fill="#222" stroke="#333" stroke-width="0.5"/>
  <!-- Armrest -->
  <rect x="176" y="275" width="48" height="60" rx="10" fill="#e8d5be" stroke="#c9b48a" stroke-width="1.5"/>
  <!-- Armrest stitching -->
  <line x1="182" y1="282" x2="218" y2="282" stroke="url(#stitch)" stroke-width="1"/>
  <line x1="182" y1="292" x2="218" y2="292" stroke="url(#stitch)" stroke-width="1"/>
  <line x1="182" y1="302" x2="218" y2="302" stroke="url(#stitch)" stroke-width="1"/>
  <line x1="182" y1="312" x2="218" y2="312" stroke="url(#stitch)" stroke-width="1"/>
  <line x1="182" y1="322" x2="218" y2="322" stroke="url(#stitch)" stroke-width="1"/>

  <!-- Door panels -->
  <rect x="32" y="125" width="14" height="120" rx="5" fill="#d6cfc4" stroke="#b8b0a2" stroke-width="1"/>
  <rect x="32" y="150" width="10" height="25" rx="3" fill="#c9c0b2" stroke="#b8b0a2" stroke-width="0.5"/>
  <rect x="354" y="125" width="14" height="120" rx="5" fill="#d6cfc4" stroke="#b8b0a2" stroke-width="1"/>
  <rect x="358" y="150" width="10" height="25" rx="3" fill="#c9c0b2" stroke="#b8b0a2" stroke-width="0.5"/>
  <rect x="32" y="350" width="14" height="95" rx="5" fill="#d6cfc4" stroke="#b8b0a2" stroke-width="1"/>
  <rect x="354" y="350" width="14" height="95" rx="5" fill="#d6cfc4" stroke="#b8b0a2" stroke-width="1"/>

  <!-- ====== DRIVER SEAT ====== -->
  <g transform="translate(48, 135)">
    <!-- Headrest -->
    <rect x="28" y="-10" width="58" height="22" rx="10" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1.2"/>
    <line x1="45" y1="-5" x2="45" y2="8" stroke="#c9b48a" stroke-width="0.6" stroke-dasharray="2 1.5"/>
    <line x1="68" y1="-5" x2="68" y2="8" stroke="#c9b48a" stroke-width="0.6" stroke-dasharray="2 1.5"/>
    <!-- Seat back -->
    <rect x="8" y="14" width="100" height="28" rx="10" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1.2"/>
    <!-- Seat cushion -->
    <rect x="5" y="46" width="106" height="80" rx="14" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1.5"/>
    <ellipse cx="58" cy="80" rx="38" ry="22" fill="url(#seatCushionHL)"/>
    <!-- Stitching -->
    <line x1="22" y1="55" x2="22" y2="115" stroke="#c9b48a" stroke-width="0.7" stroke-dasharray="3 2"/>
    <line x1="94" y1="55" x2="94" y2="115" stroke="#c9b48a" stroke-width="0.7" stroke-dasharray="3 2"/>
    <line x1="58" y1="55" x2="58" y2="115" stroke="#c9b48a" stroke-width="0.4" stroke-dasharray="3 2" opacity="0.5"/>
    <!-- Side bolsters -->
    <rect x="0" y="50" width="14" height="68" rx="7" fill="url(#seatSide)" stroke="#c9b48a" stroke-width="1"/>
    <rect x="102" y="50" width="14" height="68" rx="7" fill="url(#seatSide)" stroke="#c9b48a" stroke-width="1"/>
  </g>

  <!-- ====== FRONT PASSENGER SEAT ====== -->
  <g transform="translate(238, 135)">
    <rect x="28" y="-10" width="58" height="22" rx="10" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1.2"/>
    <line x1="45" y1="-5" x2="45" y2="8" stroke="#c9b48a" stroke-width="0.6" stroke-dasharray="2 1.5"/>
    <line x1="68" y1="-5" x2="68" y2="8" stroke="#c9b48a" stroke-width="0.6" stroke-dasharray="2 1.5"/>
    <rect x="8" y="14" width="100" height="28" rx="10" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1.2"/>
    <rect x="5" y="46" width="106" height="80" rx="14" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1.5"/>
    <ellipse cx="58" cy="80" rx="38" ry="22" fill="url(#seatCushionHL)"/>
    <line x1="22" y1="55" x2="22" y2="115" stroke="#c9b48a" stroke-width="0.7" stroke-dasharray="3 2"/>
    <line x1="94" y1="55" x2="94" y2="115" stroke="#c9b48a" stroke-width="0.7" stroke-dasharray="3 2"/>
    <line x1="58" y1="55" x2="58" y2="115" stroke="#c9b48a" stroke-width="0.4" stroke-dasharray="3 2" opacity="0.5"/>
    <rect x="0" y="50" width="14" height="68" rx="7" fill="url(#seatSide)" stroke="#c9b48a" stroke-width="1"/>
    <rect x="102" y="50" width="14" height="68" rx="7" fill="url(#seatSide)" stroke="#c9b48a" stroke-width="1"/>
  </g>

  <!-- ====== BACK LEFT SEAT ====== -->
  <g transform="translate(38, 355)">
    <rect x="22" y="-8" width="52" height="20" rx="8" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1"/>
    <line x1="38" y1="-3" x2="38" y2="8" stroke="#c9b48a" stroke-width="0.5" stroke-dasharray="2 1.5"/>
    <line x1="58" y1="-3" x2="58" y2="8" stroke="#c9b48a" stroke-width="0.5" stroke-dasharray="2 1.5"/>
    <rect x="5" y="14" width="90" height="24" rx="8" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1"/>
    <rect x="3" y="42" width="95" height="70" rx="12" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1.5"/>
    <ellipse cx="50" cy="72" rx="32" ry="18" fill="url(#seatCushionHL)"/>
    <line x1="18" y1="50" x2="18" y2="102" stroke="#c9b48a" stroke-width="0.6" stroke-dasharray="3 2"/>
    <line x1="82" y1="50" x2="82" y2="102" stroke="#c9b48a" stroke-width="0.6" stroke-dasharray="3 2"/>
    <rect x="0" y="46" width="10" height="58" rx="5" fill="url(#seatSide)" stroke="#c9b48a" stroke-width="0.8"/>
  </g>

  <!-- ====== BACK CENTER SEAT ====== -->
  <g transform="translate(148, 355)">
    <rect x="22" y="-8" width="52" height="20" rx="8" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1"/>
    <line x1="38" y1="-3" x2="38" y2="8" stroke="#c9b48a" stroke-width="0.5" stroke-dasharray="2 1.5"/>
    <line x1="58" y1="-3" x2="58" y2="8" stroke="#c9b48a" stroke-width="0.5" stroke-dasharray="2 1.5"/>
    <rect x="5" y="14" width="90" height="24" rx="8" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1"/>
    <rect x="3" y="42" width="95" height="70" rx="12" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1.5"/>
    <ellipse cx="50" cy="72" rx="32" ry="18" fill="url(#seatCushionHL)"/>
    <line x1="18" y1="50" x2="18" y2="102" stroke="#c9b48a" stroke-width="0.6" stroke-dasharray="3 2"/>
    <line x1="82" y1="50" x2="82" y2="102" stroke="#c9b48a" stroke-width="0.6" stroke-dasharray="3 2"/>
  </g>

  <!-- ====== BACK RIGHT SEAT ====== -->
  <g transform="translate(258, 355)">
    <rect x="22" y="-8" width="52" height="20" rx="8" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1"/>
    <line x1="38" y1="-3" x2="38" y2="8" stroke="#c9b48a" stroke-width="0.5" stroke-dasharray="2 1.5"/>
    <line x1="58" y1="-3" x2="58" y2="8" stroke="#c9b48a" stroke-width="0.5" stroke-dasharray="2 1.5"/>
    <rect x="5" y="14" width="90" height="24" rx="8" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1"/>
    <rect x="3" y="42" width="95" height="70" rx="12" fill="url(#seatLeather)" stroke="#c9b48a" stroke-width="1.5"/>
    <ellipse cx="50" cy="72" rx="32" ry="18" fill="url(#seatCushionHL)"/>
    <line x1="18" y1="50" x2="18" y2="102" stroke="#c9b48a" stroke-width="0.6" stroke-dasharray="3 2"/>
    <line x1="82" y1="50" x2="82" y2="102" stroke="#c9b48a" stroke-width="0.6" stroke-dasharray="3 2"/>
    <rect x="90" y="46" width="10" height="58" rx="5" fill="url(#seatSide)" stroke="#c9b48a" stroke-width="0.8"/>
  </g>

  <!-- Floor mats (beige) -->
  <rect x="55" y="260" width="100" height="55" rx="8" fill="#c4b5a0" stroke="#b8a88e" stroke-width="0.8" opacity="0.5"/>
  <rect x="245" y="260" width="100" height="55" rx="8" fill="#c4b5a0" stroke="#b8a88e" stroke-width="0.8" opacity="0.5"/>
</svg>
