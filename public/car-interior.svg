<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <!-- Leather texture pattern -->
    <pattern id="leather" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#2a2a2a"/>
      <circle cx="1" cy="1" r="0.3" fill="#222"/>
      <circle cx="3" cy="3" r="0.3" fill="#222"/>
    </pattern>
    <!-- Seat cushion pattern -->
    <pattern id="seatTexture" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#1a1a1a"/>
      <line x1="0" y1="3" x2="6" y2="3" stroke="#222" stroke-width="0.5"/>
    </pattern>
    <!-- Floor carpet -->
    <pattern id="carpet" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#1e1e1e"/>
      <circle cx="1.5" cy="1.5" r="0.4" fill="#252525"/>
    </pattern>
    <!-- Gradient for glass -->
    <linearGradient id="windshield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b8fb9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2a4a5e" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="rearGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4a5e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#5b8fb9" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Dashboard gradient -->
    <linearGradient id="dashGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <!-- Seat gradient -->
    <linearGradient id="seatGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="40%" stop-color="#282828"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <radialGradient id="seatHighlight">
      <stop offset="0%" stop-color="#444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#222" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Car body -->
  <rect width="400" height="500" rx="60" fill="url(#carpet)"/>

  <!-- Car body outline -->
  <rect x="20" y="15" width="360" height="470" rx="50" fill="none" stroke="#333" stroke-width="3"/>

  <!-- Wheel arches -->
  <rect x="5" y="90" width="18" height="60" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <rect x="377" y="90" width="18" height="60" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <rect x="5" y="340" width="18" height="60" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <rect x="377" y="340" width="18" height="60" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>

  <!-- Windshield -->
  <path d="M 80 25 Q 200 -5 320 25 L 330 70 Q 200 55 70 70 Z" fill="url(#windshield)" stroke="#5a7a8a" stroke-width="1.5"/>
  <!-- Windshield reflection -->
  <path d="M 120 30 Q 200 15 280 30 L 275 50 Q 200 40 125 50 Z" fill="white" opacity="0.06"/>

  <!-- Rear window -->
  <path d="M 90 465 Q 200 490 310 465 L 320 430 Q 200 440 80 430 Z" fill="url(#rearGlass)" stroke="#5a7a8a" stroke-width="1.5"/>

  <!-- Dashboard -->
  <rect x="40" y="65" width="320" height="55" rx="12" fill="url(#dashGrad)" stroke="#444" stroke-width="1"/>
  <!-- Dashboard details -->
  <!-- Gauge cluster left -->
  <circle cx="100" cy="88" r="16" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <circle cx="100" cy="88" r="12" fill="#111" stroke="#555" stroke-width="0.5"/>
  <line x1="100" y1="80" x2="100" y2="88" stroke="#e55" stroke-width="1" opacity="0.8"/>
  <!-- Gauge cluster right -->
  <circle cx="140" cy="88" r="16" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <circle cx="140" cy="88" r="12" fill="#111" stroke="#555" stroke-width="0.5"/>
  <line x1="140" y1="82" x2="145" y2="88" stroke="#e55" stroke-width="1" opacity="0.8"/>
  <!-- Center display -->
  <rect x="175" y="75" width="60" height="28" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <rect x="178" y="78" width="54" height="22" rx="2" fill="#0a1520" stroke="#234" stroke-width="0.5"/>
  <!-- AC vents -->
  <rect x="260" y="78" width="30" height="10" rx="3" fill="#222" stroke="#444" stroke-width="0.8"/>
  <rect x="260" y="93" width="30" height="10" rx="3" fill="#222" stroke="#444" stroke-width="0.8"/>
  <!-- Glove box area -->
  <rect x="300" y="75" width="45" height="30" rx="5" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.8"/>

  <!-- Rearview mirror -->
  <ellipse cx="200" cy="50" rx="22" ry="8" fill="#2a2a2a" stroke="#444" stroke-width="1.5"/>
  <ellipse cx="200" cy="50" rx="18" ry="5" fill="#1a2a3a" stroke="#345" stroke-width="0.5"/>

  <!-- Steering wheel -->
  <g transform="translate(105, 155)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#3a3a3a" stroke-width="8"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#444" stroke-width="5"/>
    <circle cx="0" cy="0" r="15" fill="#333" stroke="#444" stroke-width="2"/>
    <!-- Logo -->
    <circle cx="0" cy="0" r="8" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
    <!-- Spokes -->
    <line x1="0" y1="-15" x2="0" y2="-35" stroke="#3a3a3a" stroke-width="6" stroke-linecap="round"/>
    <line x1="-13" y1="8" x2="-30" y2="20" stroke="#3a3a3a" stroke-width="6" stroke-linecap="round"/>
    <line x1="13" y1="8" x2="30" y2="20" stroke="#3a3a3a" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Center console -->
  <rect x="170" y="125" width="60" height="200" rx="8" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- Gear shift -->
  <rect x="185" y="140" width="30" height="40" rx="6" fill="#222" stroke="#444" stroke-width="1"/>
  <ellipse cx="200" cy="160" rx="8" ry="10" fill="#333" stroke="#555" stroke-width="1.5"/>
  <circle cx="200" cy="158" r="4" fill="#444"/>
  <!-- Cupholder area -->
  <circle cx="192" cy="210" r="14" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <circle cx="208" cy="235" r="14" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <!-- Armrest -->
  <rect x="175" y="260" width="50" height="55" rx="8" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
  <!-- Armrest stitching -->
  <line x1="180" y1="265" x2="220" y2="265" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="180" y1="275" x2="220" y2="275" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="180" y1="285" x2="220" y2="285" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="180" y1="295" x2="220" y2="295" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="180" y1="305" x2="220" y2="305" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>

  <!-- DRIVER SEAT (left) -->
  <g transform="translate(40, 130)">
    <!-- Seat back / headrest -->
    <rect x="5" y="0" width="105" height="25" rx="10" fill="url(#seatGrad)" stroke="#3a3a3a" stroke-width="1.5"/>
    <!-- Headrest -->
    <rect x="30" y="-8" width="55" height="20" rx="8" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
    <line x1="45" y1="-4" x2="45" y2="8" stroke="#444" stroke-width="0.5" stroke-dasharray="1.5 1.5"/>
    <line x1="70" y1="-4" x2="70" y2="8" stroke="#444" stroke-width="0.5" stroke-dasharray="1.5 1.5"/>
    <!-- Seat cushion -->
    <rect x="5" y="30" width="110" height="85" rx="12" fill="url(#seatGrad)" stroke="#3a3a3a" stroke-width="1.5"/>
    <ellipse cx="60" cy="65" rx="40" ry="25" fill="url(#seatHighlight)"/>
    <!-- Stitching lines -->
    <line x1="20" y1="42" x2="20" y2="100" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
    <line x1="100" y1="42" x2="100" y2="100" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
    <line x1="35" y1="50" x2="35" y2="95" stroke="#3a3a3a" stroke-width="0.3" stroke-dasharray="2 2"/>
    <line x1="85" y1="50" x2="85" y2="95" stroke="#3a3a3a" stroke-width="0.3" stroke-dasharray="2 2"/>
    <!-- Side bolsters -->
    <rect x="0" y="35" width="12" height="70" rx="6" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
    <rect x="108" y="35" width="12" height="70" rx="6" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
  </g>

  <!-- FRONT PASSENGER SEAT (right) -->
  <g transform="translate(240, 130)">
    <rect x="5" y="0" width="105" height="25" rx="10" fill="url(#seatGrad)" stroke="#3a3a3a" stroke-width="1.5"/>
    <rect x="30" y="-8" width="55" height="20" rx="8" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
    <line x1="45" y1="-4" x2="45" y2="8" stroke="#444" stroke-width="0.5" stroke-dasharray="1.5 1.5"/>
    <line x1="70" y1="-4" x2="70" y2="8" stroke="#444" stroke-width="0.5" stroke-dasharray="1.5 1.5"/>
    <rect x="5" y="30" width="110" height="85" rx="12" fill="url(#seatGrad)" stroke="#3a3a3a" stroke-width="1.5"/>
    <ellipse cx="60" cy="65" rx="40" ry="25" fill="url(#seatHighlight)"/>
    <line x1="20" y1="42" x2="20" y2="100" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
    <line x1="100" y1="42" x2="100" y2="100" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
    <line x1="35" y1="50" x2="35" y2="95" stroke="#3a3a3a" stroke-width="0.3" stroke-dasharray="2 2"/>
    <line x1="85" y1="50" x2="85" y2="95" stroke="#3a3a3a" stroke-width="0.3" stroke-dasharray="2 2"/>
    <rect x="0" y="35" width="12" height="70" rx="6" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
    <rect x="108" y="35" width="12" height="70" rx="6" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
  </g>

  <!-- BACK LEFT SEAT -->
  <g transform="translate(30, 340)">
    <rect x="5" y="0" width="95" height="22" rx="8" fill="url(#seatGrad)" stroke="#3a3a3a" stroke-width="1.5"/>
    <rect x="25" y="-8" width="50" height="18" rx="7" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
    <rect x="5" y="28" width="100" height="75" rx="10" fill="url(#seatGrad)" stroke="#3a3a3a" stroke-width="1.5"/>
    <ellipse cx="55" cy="60" rx="35" ry="22" fill="url(#seatHighlight)"/>
    <line x1="18" y1="38" x2="18" y2="90" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
    <line x1="90" y1="38" x2="90" y2="90" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
    <rect x="0" y="32" width="10" height="60" rx="5" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
    <rect x="100" y="32" width="10" height="60" rx="5" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
  </g>

  <!-- BACK CENTER SEAT -->
  <g transform="translate(145, 340)">
    <rect x="5" y="0" width="95" height="22" rx="8" fill="url(#seatGrad)" stroke="#3a3a3a" stroke-width="1.5"/>
    <rect x="25" y="-8" width="50" height="18" rx="7" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
    <rect x="5" y="28" width="100" height="75" rx="10" fill="url(#seatGrad)" stroke="#3a3a3a" stroke-width="1.5"/>
    <ellipse cx="55" cy="60" rx="35" ry="22" fill="url(#seatHighlight)"/>
    <line x1="18" y1="38" x2="18" y2="90" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
    <line x1="90" y1="38" x2="90" y2="90" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
  </g>

  <!-- BACK RIGHT SEAT -->
  <g transform="translate(260, 340)">
    <rect x="5" y="0" width="95" height="22" rx="8" fill="url(#seatGrad)" stroke="#3a3a3a" stroke-width="1.5"/>
    <rect x="25" y="-8" width="50" height="18" rx="7" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
    <rect x="5" y="28" width="100" height="75" rx="10" fill="url(#seatGrad)" stroke="#3a3a3a" stroke-width="1.5"/>
    <ellipse cx="55" cy="60" rx="35" ry="22" fill="url(#seatHighlight)"/>
    <line x1="18" y1="38" x2="18" y2="90" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
    <line x1="90" y1="38" x2="90" y2="90" stroke="#444" stroke-width="0.5" stroke-dasharray="2 2"/>
    <rect x="100" y="32" width="10" height="60" rx="5" fill="#2e2e2e" stroke="#3a3a3a" stroke-width="1"/>
  </g>

  <!-- Door panels -->
  <rect x="25" y="130" width="12" height="110" rx="4" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="363" y="130" width="12" height="110" rx="4" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="25" y="335" width="12" height="95" rx="4" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="363" y="335" width="12" height="95" rx="4" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Floor mats -->
  <rect x="50" y="250" width="100" height="60" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="250" y="250" width="100" height="60" rx="6" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
</svg>
